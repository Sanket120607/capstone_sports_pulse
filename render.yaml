services:
  - type: web
    name: sportpulse-india
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: TAVILY_API_KEY
        sync: false
      - key: BRAVE_SEARCH_API_KEY
        sync: false
